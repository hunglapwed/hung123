<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VHDT Sneaker - Nike Mag Edition</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <nav class="container">
            <div class="logo-box">
                <a href="index.html" class="logo-link">
                    <img src="unnamed.jpg" alt="VHDT SNEAKER" class="logo-img">
                    <span class="logo-text">VHDT<span>SNEAKER</span></span>
                </a>
            </div>

            <input type="checkbox" id="check">
            <label for="check" class="checkbtn">
                <i class="fas fa-bars"></i>
            </label>

            <ul class="nav-menu">
                <li><a href="index.html" class="active">Trang Chủ</a></li>
                <li><a href="sanpham.html">Sản Phẩm</a></li>
                <li><a href="gthieu.html">Giới Thiệu</a></li>
                <li><a href="lienhe.html">Liên Hệ</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero-banner">
            <div class="banner-track">
                <div class="banner-slide">
                    <img src="tải xuống (1).jpg" alt="Nike Mag 1">
                </div>
                <div class="banner-slide">
                    <img src="tải xuống.jpg" alt="Nike Mag 2">
                </div>
            </div>
            <div class="hero-content">
                <h1>NIKE MAG 2016</h1>
                <p>"Bước chân phong cách, khẳng định bản sắc"</p>
                <a href="#order" class="btn-main">MUA NGAY</a>
            </div>
        </section>

        <section class="new-arrivals container">
            <div class="header-center">
                <h2>NEW ARRIVALS</h2>
                <div class="line"></div>
            </div>
    
            <div class="product-grid">
                <div class="item">
                    <div class="item-img">
                        <img src="z7608213312523_a5ca782886a04989293020ea78845991.jpg" alt="Nike Mag">
                    </div>
                    <h3>NIKE MAG 2016</h3>
                    <p>Hệ thống đèn LED</p>
                </div>
                </div>
        </section>

        <section id="order" class="order-section container">
            <div class="order-container">
                <div class="order-info">
                    <span class="badge">Hot Trend</span>
                    <h2>ĐẶT HÀNG NHANH</h2>
                    <p>Trang bị công nghệ **Power Laces** tự thắt dây thực thụ.</p>
                </div>
                <form class="form-box">
                    <input type="text" placeholder="Họ và tên" required>
                    <input type="tel" placeholder="Số điện thoại" required>
                    <select required>
                        <option value="">Chọn Size (US)</option>
                        <option value="9">9</option>
                        <option value="10">10</option>
                    </select>
                    <button type="submit">GỬI YÊU CẦU</button>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
